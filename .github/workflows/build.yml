name: Build sing-box rule-set

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Пересобрать, даже если источник не изменился"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: build-ruleset
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download source lists
        run: |
          curl -fsSL --retry 3 --retry-delay 5 \
          https://raw.githubusercontent.com/Internet-Helper/GeoHideDNS/main/hosts/hosts \
          -o hosts_geo

          curl -fsSL --retry 3 --retry-delay 5 \
          https://raw.githubusercontent.com/ImMALWARE/dns.malw.link/refs/heads/master/hosts \
          -o hosts_malw

      - name: Validate downloaded files
        run: |
          for f in hosts_geo hosts_malw; do
            if [ ! -s "$f" ]; then
              echo "::error::File $f is empty or missing"
              exit 1
            fi
            if grep -qi "<html" "$f"; then
              echo "::error::File $f looks like an HTML page"
              exit 1
            fi
          done

          lines=$(cat hosts_geo hosts_malw | wc -l)
          echo "Total downloaded lines: $lines"

          if [ "$lines" -lt 100 ]; then
            echo "::error::Total lists look too small ($lines lines), aborting"
            exit 1
          fi

      - name: Check if source changed
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          new_hash=$(cat hosts_geo hosts_malw | sha256sum | awk '{print $1}')
          echo "$new_hash" > hosts.sha256

          if gh release download latest \
              --repo "$GITHUB_REPOSITORY" \
              -p hosts.sha256 \
              -O previous.sha256 2>/dev/null; then
            previous_hash=$(cat previous.sha256)
          else
            previous_hash=""
          fi

          echo "Previous hash: ${previous_hash:-(none, first run or asset missing)}"
          echo "New hash:      $new_hash"

          if [ "$new_hash" = "$previous_hash" ] && [ "${{ inputs.force }}" != "true" ]; then
            echo "Source hasn't changed since last build, skipping"
            echo "## ⏭️ Skipped: source unchanged" >> "$GITHUB_STEP_SUMMARY"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Sources changed (or forced rebuild), proceeding"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install sing-box
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          latest_tag=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/SagerNet/sing-box/releases/latest \
            | grep -oP '"tag_name":\s*"\K[^"]+')

          version="${latest_tag#v}"
          archive="sing-box-${version}-linux-amd64.tar.gz"

          curl -fsSL --retry 3 \
          "https://github.com/SagerNet/sing-box/releases/download/${latest_tag}/${archive}" \
          -o "${archive}"

          curl -fsSL --retry 3 \
          "https://github.com/SagerNet/sing-box/releases/download/${latest_tag}/sing-box-${version}-linux-amd64.tar.gz.sha256sum" \
          -o checksum.txt || true

          if [ -s checksum.txt ]; then
            sha256sum -c checksum.txt
          fi

          tar xf "${archive}"
          sudo mv "sing-box-${version}-linux-amd64/sing-box" /usr/local/bin/sing-box
          sing-box version

      - name: Convert hosts to rule-set
        if: steps.check.outputs.skip != 'true'
        run: |
          bash scripts/convert.sh

      - name: Validate generated rule-set
        if: steps.check.outputs.skip != 'true'
        run: |
          if [ ! -s domains.srs ]; then
            echo "::error::domains.srs was not created or is empty"
            exit 1
          fi

          sing-box rule-set decompile domains.srs --output /tmp/verify.json
          python3 -m json.tool /tmp/verify.json > /dev/null

          size=$(stat -c%s domains.srs)
          echo "domains.srs size: ${size} bytes"

      - name: Upload release asset
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view latest --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload latest domains.srs hosts.sha256 --clobber
          else
            gh release create latest domains.srs hosts.sha256 \
              --title "Custom Domains sing-box rules" \
              --notes "Automatic update"
          fi
